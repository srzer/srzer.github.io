pan class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=k;++i)</span><br><span class="line">		<span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;c[i].col&gt;&gt;c[i].typ;</span><br><span class="line">	k=k/<span class="number">2</span>*<span class="number">2</span>;</span><br><span class="line">	<span class="keyword">if</span>(k&lt;<span class="number">4</span>*n)&#123;</span><br><span class="line">		<span class="built_in">puts</span>(<span class="string">"Error:cards not enough"</span>);</span><br><span class="line">		<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">while</span>(m--)&#123;</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=k&gt;&gt;<span class="number">1</span>;++i)</span><br><span class="line">			temp[i*<span class="number">2</span><span class="number">-1</span>]=c[k/<span class="number">2</span>+i],temp[i&lt;&lt;<span class="number">1</span>]=c[i];</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=k;++i)</span><br><span class="line">			c[i]=temp[i];</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=<span class="number">4</span>;++i)</span><br><span class="line">		<span class="built_in">std</span>::<span class="built_in">cout</span>&lt;&lt;c[i*n-n+p].col&lt;&lt;<span class="string">" "</span>&lt;&lt;c[i*n-n+p].typ&lt;&lt;<span class="built_in">std</span>::<span class="built_in">endl</span>;</span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

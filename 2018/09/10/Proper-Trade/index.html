<h5 id="Analysis"><a href="#Analysis" class="headerlink" title="Analysis"></a><em>Analysis</em></h5><p>因为贸易只进行一次，所以做两次spfa，一次求起点到x点买的最小值，一次求x点到终点卖的最大值，最后枚举求最优。</p>

n class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="keyword">int</span> n,m,tot,rx[<span class="number">500010</span>],ry[<span class="number">500010</span>],rz[<span class="number">500010</span>],c[<span class="number">100010</span>],mn[<span class="number">100010</span>],mx[<span class="number">100010</span>],exist[<span class="number">100010</span>],head[<span class="number">100010</span>];</span><br><span class="line"><span class="built_in">std</span>::<span class="built_in">queue</span> &lt;<span class="keyword">int</span>&gt; q;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">node</span></span></span><br><span class="line"><span class="class">&#123;</span></span><br><span class="line">	<span class="keyword">int</span> ver,next;</span><br><span class="line">&#125;edge[<span class="number">500010</span>];</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">add</span><span class="params">(<span class="keyword">int</span> x,<span class="keyword">int</span> y)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	edge[++tot].ver=y;</span><br><span class="line">	edge[tot].next=head[x];</span><br><span class="line">	head[x]=tot;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">spfa_min</span><span class="params">(<span class="keyword">int</span> s)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="built_in">memset</span>(exist,<span class="number">0</span>,<span class="keyword">sizeof</span>(exist));</span><br><span class="line">	<span class="built_in">memset</span>(mn,<span class="number">0x3f</span>,<span class="keyword">sizeof</span>(mn));</span><br><span class="line">	q.push(s);</span><br><span class="line">	exist[s]=<span class="number">1</span>;</span><br><span class="line">	mn[s]=c[s];</span><br><span class="line">	<span class="keyword">while</span>(!q.empty())</span><br><span class="line">	&#123;		</span><br><span class="line">		s=q.front();</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=head[s];i;i=edge[i].next)</span><br><span class="line">			<span class="keyword">if</span>(<span class="built_in">std</span>::min(mn[s],c[edge[i].ver])&lt;mn[edge[i].ver])</span><br><span class="line">			&#123;</span><br><span class="line">				mn[edge[i].ver]=<span class="built_in">std</span>::min(mn[s],c[edge[i].ver]);</span><br><span class="line">				<span class="keyword">if</span>(!exist[edge[i].ver])</span><br><span class="line">				&#123;</span><br><span class="line">					exist[edge[i].ver]=<span class="number">1</span>;</span><br><span class="line">					q.push(edge[i].ver);</span><br><span class="line">				&#125;</span><br><span class="line">			&#125;</span><br><span class="line">		q.pop();</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">spfa_max</span><span class="params">(<span class="keyword">int</span> s)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="keyword">while</span>(!q.empty())</span><br><span class="line">		q.pop();</span><br><span class="line">	<span class="built_in">memset</span>(exist,<span class="number">0</span>,<span class="keyword">sizeof</span>(exist));</span><br><span class="line">	q.push(s);</span><br><span class="line">	exist[s]=<span class="number">1</span>;</span><br><span class="line">	mx[s]=c[s];</span><br><span class="line">	<span class="keyword">while</span>(!q.empty())</span><br><span class="line">	&#123;</span><br><span class="line">		s=q.front();</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=head[s];i;i=edge[i].next)</span><br><span class="line">			<span class="keyword">if</span>(mx[edge[i].ver]&lt;<span class="built_in">std</span>::max(c[edge[i].ver],mx[s]))</span><br><span class="line">			&#123;</span><br><span class="line">				mx[edge[i].ver]=<span class="built_in">std</span>::max(c[edge[i].ver],mx[s]);</span><br><span class="line">				<span class="keyword">if</span>(!exist[edge[i].ver])</span><br><span class="line">				&#123;</span><br><span class="line">					exist[edge[i].ver]=<span class="number">1</span>;</span><br><span class="line">					q.push(edge[i].ver);</span><br><span class="line">				&#125;</span><br><span class="line">			&#125;</span><br><span class="line">		q.pop();</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">	<span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;n&gt;&gt;m;</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=n;i++)</span><br><span class="line">		<span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;c[i];</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=m;i++)</span><br><span class="line">		<span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;rx[i]&gt;&gt;ry[i]&gt;&gt;rz[i];</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=m;i++)</span><br><span class="line">	&#123;</span><br><span class="line">		add(rx[i],ry[i]);</span><br><span class="line">		<span class="keyword">if</span>(rz[i]&gt;<span class="number">1</span>)</span><br><span class="line">			add(ry[i],rx[i]);</span><br><span class="line">	&#125;</span><br><span class="line">	spfa_min(<span class="number">1</span>);</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=tot;i++)</span><br><span class="line">		edge[i].ver=edge[i].next=<span class="number">0</span>;</span><br><span class="line">	tot=<span class="number">0</span>;</span><br><span class="line">	<span class="built_in">memset</span>(head,<span class="number">0</span>,<span class="keyword">sizeof</span>(head));</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=m;i++)</span><br><span class="line">	&#123;</span><br><span class="line">		add(ry[i],rx[i]);</span><br><span class="line">		<span class="keyword">if</span>(rz[i]&gt;<span class="number">1</span>)</span><br><span class="line">			add(rx[i],ry[i]);</span><br><span class="line">	&#125;</span><br><span class="line">	spfa_max(n);</span><br><span class="line">	<span class="keyword">int</span> ans=<span class="number">0</span>;</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=n;i++)</span><br><span class="line">		ans=<span class="built_in">std</span>::max(ans,mx[i]-mn[i]);</span><br><span class="line">	<span class="built_in">std</span>::<span class="built_in">cout</span>&lt;&lt;ans&lt;&lt;<span class="built_in">std</span>::<span class="built_in">endl</span>;</span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

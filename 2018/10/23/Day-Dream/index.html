  <h2 class="title">白日梦</h2>
  <p class="sub">Oct 23, 2018</p>
  <article class="content">
    <h5 id="Analysis"><a href="#Analysis" class="headerlink" title="Analysis"></a><em>Analysis</em></h5><p>事实上，逆元的存在并没让这道题变的复杂，反而简单了许多。用基本的概率知识动规解决即可。</p>
<h5 id="Code"><a href="#Code" class="headerlink" title="Code"></a><em>Code</em></h5><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">typedef</span> <span class="keyword">long</span> <span class="keyword">long</span> int64;</span><br><span class="line"><span class="keyword">const</span> int64 MO=<span class="number">998244353</span>;</span><br><span class="line">int64 n,m,p,s,w,dp[(<span class="keyword">int</span>)<span class="number">1e6</span>+<span class="number">100</span>];</span><br><span class="line"><span class="function">int64 <span class="title">fuck</span><span class="params">(int64 x)</span></span>&#123;</span><br><span class="line">        <span class="keyword">if</span>(x&gt;n)<span class="keyword">return</span> <span class="number">0</span>;<span class="keyword">if</span>(dp[(<span class="keyword">int</span>)x])<span class="keyword">return</span> dp[(<span class="keyword">int</span>)x];int64 l=<span class="built_in">std</span>::min(m,n-x);</span><br><span class="line">        <span class="keyword">return</span> dp[(<span class="keyword">int</span>)x]=(s+(fuck(x+l+<span class="number">1</span>)+w*l%MO)*p%MO+fuck(x+<span class="number">1</span>)*(<span class="number">1</span>-p)%MO)%MO;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">        freopen(<span class="string">"daydream.in"</span>,<span class="string">"r"</span>,<span class="built_in">stdin</span>);</span><br><span class="line">        freopen(<span class="string">"daydream.out"</span>,<span class="string">"w"</span>,<span class="built_in">stdout</span>);</span><br><span class="line">        int64 A,B,C,D;<span class="built_in">scanf</span>(<span class="string">"%lld%lld%lld%lld%lld%lld%lld"</span>,&amp;n,&amp;m,&amp;p,&amp;D,&amp;A,&amp;B,&amp;C);</span><br><span class="line">        s=A%MO,w=(B*(<span class="number">1</span>-D)%MO+C*D%MO)%MO;</span><br><span class="line">        int64 ans=fuck(<span class="number">0</span>)-s;<span class="keyword">while</span>(ans&lt;<span class="number">0</span>)ans+=MO;<span class="keyword">while</span>(ans&gt;=MO)ans-=MO;</span><br><span class="line">        <span class="built_in">std</span>::<span class="built_in">cout</span>&lt;&lt;ans&lt;&lt;<span class="built_in">std</span>::<span class="built_in">endl</span>;</span><br><span class="line">        <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

  <h2 class="title">香甜的黄油</h2>
  <p class="sub">Sep 9, 2018</p>
  <article class="content">
    <p><em>Analysis</em></p>
<p>多源最短路问题。Floyd会T，对于这个略稠密的图，用Dijkstra比较理想。</p>
<p><em>Code (n^2logn)</em></p>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"><span class="keyword">const</span> <span class="keyword">int</span> N=<span class="number">810</span>;</span><br><span class="line"><span class="keyword">int</span> n,p,c,farm[N],d[N];</span><br><span class="line">priority_queue &lt;pair&lt;<span class="keyword">int</span>,<span class="keyword">int</span>&gt; &gt; heap;</span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">chain_star</span>&#123;</span></span><br><span class="line">	<span class="keyword">public</span>:</span><br><span class="line">		<span class="keyword">int</span> tot,head[N];</span><br><span class="line">		<span class="class"><span class="keyword">class</span> <span class="title">edge</span>&#123;</span></span><br><span class="line">			<span class="keyword">public</span>:</span><br><span class="line">				<span class="keyword">int</span> v,w,nxt;</span><br><span class="line">		&#125;e[N*N];</span><br><span class="line">		<span class="function"><span class="keyword">void</span> <span class="title">add</span><span class="params">(<span class="keyword">int</span> u,<span class="keyword">int</span> v,<span class="keyword">int</span> w)</span></span>&#123;</span><br><span class="line">			e[++tot].v=v;</span><br><span class="line">			e[tot].w=w;</span><br><span class="line">			e[tot].nxt=head[u];</span><br><span class="line">			head[u]=tot;</span><br><span class="line">		&#125;</span><br><span class="line">&#125;chain;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">heap_clear</span><span class="params">()</span></span>&#123;</span><br><span class="line">	<span class="keyword">while</span>(!heap.empty())heap.pop();</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">Dijkstra</span><span class="params">(<span class="keyword">int</span> s)</span></span>&#123;</span><br><span class="line">	d[s]=<span class="number">0</span>;</span><br><span class="line">	heap.push(make_pair(<span class="number">0</span>,s));</span><br><span class="line">	<span class="keyword">while</span>(!heap.empty())&#123;</span><br><span class="line">		<span class="keyword">while</span>(!heap.empty()&amp;&amp;d[heap.top().second]!=-heap.top().first)</span><br><span class="line">			heap.pop();</span><br><span class="line">		<span class="keyword">if</span>(heap.empty())<span class="keyword">break</span>;</span><br><span class="line">		s=heap.top().second;</span><br><span class="line">		heap.pop();</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> i=chain.head[s];i;i=chain.e[i].nxt)&#123;</span><br><span class="line">			<span class="keyword">int</span> v=chain.e[i].v;</span><br><span class="line">			<span class="keyword">if</span>(d[v]&gt;d[s]+chain.e[i].w)&#123;</span><br><span class="line">				d[v]=d[s]+chain.e[i].w;</span><br><span class="line">				heap.push(make_pair(-d[v],v));</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">	freopen(<span class="string">"butter.in"</span>,<span class="string">"r"</span>,<span class="built_in">stdin</span>);</span><br><span class="line">	freopen(<span class="string">"butter.out"</span>,<span class="string">"w"</span>,<span class="built_in">stdout</span>);</span><br><span class="line">	<span class="built_in">cin</span>&gt;&gt;n&gt;&gt;p&gt;&gt;c;</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=n;i++)</span><br><span class="line">		<span class="built_in">cin</span>&gt;&gt;farm[i];</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=c;i++)&#123;</span><br><span class="line">		<span class="keyword">int</span> u,v,w;</span><br><span class="line">		<span class="built_in">cin</span>&gt;&gt;u&gt;&gt;v&gt;&gt;w;</span><br><span class="line">		chain.add(u,v,w);</span><br><span class="line">		chain.add(v,u,w);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">int</span> ans=<span class="number">1e9</span>;</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=p;i++)&#123;</span><br><span class="line">		<span class="built_in">memset</span>(d,<span class="number">0x3f</span>,<span class="keyword">sizeof</span>(d));</span><br><span class="line">		heap_clear();</span><br><span class="line">		Dijkstra(i);</span><br><span class="line">		<span class="keyword">int</span> sum=<span class="number">0</span>;</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> j=<span class="number">1</span>;j&lt;=n;j++)</span><br><span class="line">			sum+=d[farm[j]];</span><br><span class="line">		ans=min(ans,sum);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="built_in">cout</span>&lt;&lt;ans&lt;&lt;<span class="built_in">endl</span>;</span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

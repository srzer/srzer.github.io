	  <div class="typo post-content slideDownMin">

		

			
					<p>虽然说，世界上对<strong>链式前向星</strong>的使用并不是很广泛，但在不愿意写复杂的邻接表的情况下，链式前向星也是一个很优秀的数据结构。</p>
<a id="more"></a>
<p><em>Usage</em></p>
<p>前向星是一个边集数组，把边的起点终点和权值存起来，然后以起点从小到大或者从大到小排序，记录每个顶点在数组中的起始位置和长度。适用于点多边少的稀疏图，或两点之间有多条弧的时候。</p>
<p>实现方法：<a href="https://blog.csdn.net/sunquana/article/details/10527969" target="_blank" rel="noopener">vibcs</a></p>
<p><em>Code</em></p>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">CFS</span>&#123;</span></span><br><span class="line">    <span class="keyword">int</span> tot,head[N];</span><br><span class="line">    <span class="class"><span class="keyword">struct</span> <span class="title">edge</span>&#123;</span></span><br><span class="line">        <span class="keyword">int</span> v,w,next;</span><br><span class="line">    &#125;edge[M];</span><br><span class="line">    <span class="function"><span class="keyword">void</span> <span class="title">add</span><span class="params">(<span class="keyword">int</span> u,<span class="keyword">int</span> v,<span class="keyword">int</span> w)</span></span>&#123;</span><br><span class="line">        edge[++tot].v=v;</span><br><span class="line">        edge[tot].w=w;</span><br><span class="line">        edge[tot].next=head[u];</span><br><span class="line">        head[u]=tot;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

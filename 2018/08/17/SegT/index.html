					<p><strong>线段树</strong>是一种二叉搜索树，与区间树相似，它将一个区间划分成一些单元区间，每个单元区间对应线段树中的一个叶结点。</p>
<a id="more"></a>
<h5 id="Usage"><a href="#Usage" class="headerlink" title="Usage"></a><em>Usage</em></h5><p>适用于一个离线数列的结合律属性在线查找。</p>
<p>实现方法：<a href="http://www.cnblogs.com/TheRoadToTheGold/p/6254255.html" target="_blank" rel="noopener">TRTTG</a></p>
<h5 id="Code"><a href="#Code" class="headerlink" title="Code"></a><em>Code</em></h5><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br></pre></td><td class="code"><pre><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">SegT</span>&#123;</span></span><br><span class="line">        <span class="keyword">private</span>:</span><br><span class="line">                <span class="class"><span class="keyword">class</span> <span class="title">node</span>&#123;</span></span><br><span class="line">                        <span class="keyword">public</span>:</span><br><span class="line">                                <span class="keyword">int</span> data,l,r,add;</span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> data(i) s[i].data</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> l(i) s[i].l</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> r(i) s[i].r</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> add(i) s[i].add</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> Lc i&lt;&lt;1</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> Rc i&lt;&lt;1|1</span></span><br><span class="line">                &#125;s[<span class="number">4</span>*MAXN];</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">update</span><span class="params">(<span class="keyword">int</span> i)</span></span>&#123;</span><br><span class="line">                        data(i)=data(Lc)+data(Rc);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">spread</span><span class="params">(<span class="keyword">int</span> i)</span></span>&#123;</span><br><span class="line">                        add(Lc)+=add(i);</span><br><span class="line">                        add(Rc)+=add(i);</span><br><span class="line">                        data(Lc)+=add(i)*(r(Lc)-l(Lc)+<span class="number">1</span>);</span><br><span class="line">                        data(Rc)+=add(i)*(r(Rc)-l(Rc)+<span class="number">1</span>);</span><br><span class="line">                        add(i)=<span class="number">0</span>;</span><br><span class="line">                &#125;</span><br><span class="line">        <span class="keyword">public</span>:</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">build</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> l,<span class="keyword">int</span> r)</span></span>&#123;</span><br><span class="line">                        l(i)=l;</span><br><span class="line">                        r(i)=r;</span><br><span class="line">                        <span class="keyword">int</span> mid=(l+r)&gt;&gt;<span class="number">1</span>;</span><br><span class="line">                        <span class="keyword">if</span>(l==r)</span><br><span class="line">                                data(i)=<span class="number">0</span>;</span><br><span class="line">                        <span class="keyword">else</span>&#123;</span><br><span class="line">                                build(Lc,l,mid);</span><br><span class="line">                                build(Rc,mid+<span class="number">1</span>,r);</span><br><span class="line">                                update(i);</span><br><span class="line">                        &#125;</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">int</span> <span class="title">query</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> l,<span class="keyword">int</span> r)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(l(i)&gt;r||r(i)&lt;l)</span><br><span class="line">                                <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">                        <span class="keyword">if</span>(l(i)&gt;=l&amp;&amp;r(i)&lt;=r)</span><br><span class="line">                                <span class="keyword">return</span> data(i);</span><br><span class="line">                        spread(i);</span><br><span class="line">                        <span class="keyword">return</span> query(Lc,l,r)+query(Rc,l,r);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">modify</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> l,<span class="keyword">int</span> r,<span class="keyword">int</span> d)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(l(i)&gt;r||r(i)&lt;l)</span><br><span class="line">                                <span class="keyword">return</span>;</span><br><span class="line">                        <span class="keyword">if</span>(l(i)&gt;=l&amp;&amp;r(i)&lt;=r)&#123;</span><br><span class="line">                                data(i)+=(r(i)-l(i)+<span class="number">1</span>)*d;</span><br><span class="line">                                add(i)+=<span class="number">1</span>;</span><br><span class="line">                                <span class="keyword">return</span>;</span><br><span class="line">                        &#125;</span><br><span class="line">                        spread(i);</span><br><span class="line">                        modify(Lc,l,r,d);</span><br><span class="line">                        modify(Rc,l,r,d);</span><br><span class="line">                        update(i);</span><br><span class="line">                &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>

yword">public</span>:</span><br><span class="line">                                <span class="keyword">int</span> data,l,r,add;</span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> data(i) leaf[i].data</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> l(i) leaf[i].l</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> r(i) leaf[i].r</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> add(i) leaf[i].add</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> Lc i&lt;&lt;1</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> Rc i&lt;&lt;1|1</span></span><br><span class="line">                &#125;leaf[<span class="number">4</span>*MAXN];</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">update</span><span class="params">(<span class="keyword">int</span> i)</span></span>&#123;</span><br><span class="line">                        data(i)=<span class="built_in">std</span>::min(data(Lc)+add(Lc),data(Rc)+add(Rc));</span><br><span class="line">                &#125;</span><br><span class="line">        <span class="keyword">public</span>:</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">build</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> l,<span class="keyword">int</span> r,<span class="keyword">int</span> s[])</span></span>&#123;</span><br><span class="line">                        l(i)=l;</span><br><span class="line">

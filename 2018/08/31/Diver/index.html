_in">scanf</span>(<span class="string">"%d%d%d"</span>,&amp;a,&amp;b,&amp;c);</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> j=N;j&gt;=a;j--)</span><br><span class="line">			<span class="keyword">for</span>(<span class="keyword">int</span> k=N;k&gt;=b;k--)</span><br><span class="line">				dp[j][k]=<span class="built_in">std</span>::min(dp[j][k],dp[j-a][k-b]+c);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">int</span> ans=<span class="number">0x3f3f3f3f</span>;</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=m;i&lt;=N;i++)</span><br><span class="line">		<span class="keyword">for</span>(<span class="keyword">int</span> j=n;j&lt;=N;j++)</span><br><span class="line">			ans=<span class="built_in">std</span>::min(ans,dp[i][j]);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">"%d\n"</span>,ans);</span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

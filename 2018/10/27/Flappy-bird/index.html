  <h2 class="title">飞扬的小鸟</h2>
  <p class="sub">Oct 27, 2018</p>
  <article class="content">
    <p></p>

<h5 id="Analysis"><a href="#Analysis" class="headerlink" title="Analysis"></a><em>Analysis</em></h5><p>动规方程很容易写出，因为小鸟可以跳完之后再跳，所以是个无限背包，而drop操作是个01背包，用空间换时间防止冲突。</p>
<p>然而，WA55，不调了。</p>
<h5 id="Code"><a href="#Code" class="headerlink" title="Code"></a><em>Code</em></h5><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"><span class="keyword">const</span> <span class="keyword">int</span> N=<span class="number">10010</span>,M=<span class="number">1010</span>,INF=<span class="number">0x3f3f3f3f</span>;</span><br><span class="line"><span class="function"><span class="keyword">inline</span> <span class="keyword">void</span> <span class="title">inIO</span><span class="params">(<span class="keyword">int</span> &amp;x)</span></span>&#123;</span><br><span class="line">    <span class="keyword">char</span> ch;x=<span class="number">0</span>;<span class="keyword">while</span>(!<span class="built_in">isdigit</span>(ch=getchar()));</span><br><span class="line">    <span class="keyword">do</span>&#123;x=(x&lt;&lt;<span class="number">1</span>)+(x&lt;&lt;<span class="number">3</span>)+ch-<span class="string">'0'</span>;&#125;<span class="keyword">while</span>(<span class="built_in">isdigit</span>(ch=getchar()));</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">int</span> n,m,ct,fly[N],drp[N],ut[N],dt[N],dp[N][M],failAns;</span><br><span class="line"><span class="keyword">bool</span> Ist[N];</span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span>&#123;</span><br><span class="line">    inIO(n),inIO(m),inIO(ct);</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>;i&lt;n;++i)</span><br><span class="line">        inIO(fly[i]),inIO(drp[i]);</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>;i&lt;=n;++i)</span><br><span class="line">        ut[i]=m+<span class="number">1</span>,dt[i]=<span class="number">0</span>;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>;i&lt;ct;++i)&#123;</span><br><span class="line">        <span class="keyword">int</span> p,l,h;</span><br><span class="line">        inIO(p),inIO(l),inIO(h);</span><br><span class="line">        Ist[p]=<span class="number">1</span>,ut[p]=h,dt[p]=l;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">memset</span>(dp,<span class="number">0x3f</span>,<span class="keyword">sizeof</span>(dp));</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>;i&lt;=m;++i)dp[<span class="number">0</span>][i]=<span class="number">0</span>;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=n;++i)&#123;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> j=dt[i]+<span class="number">1</span>;j&lt;ut[i];++j)</span><br><span class="line">            <span class="keyword">if</span>(j&gt;fly[i<span class="number">-1</span>])</span><br><span class="line">                dp[i][j]=dp[i<span class="number">-1</span>][j-fly[i<span class="number">-1</span>]]+<span class="number">1</span>;</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> j=max(dt[i],fly[i<span class="number">-1</span>])+<span class="number">1</span>;j&lt;ut[i];++j)</span><br><span class="line">            dp[i][j]=min(dp[i][j],dp[i][j-fly[i<span class="number">-1</span>]]+<span class="number">1</span>);</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">int</span> j=dt[i]+<span class="number">1</span>;j&lt;ut[i];++j)</span><br><span class="line">            <span class="keyword">if</span>(j+drp[i<span class="number">-1</span>]&lt;=m)</span><br><span class="line">                dp[i][j]=min(dp[i][j],dp[i<span class="number">-1</span>][j+drp[i<span class="number">-1</span>]]);</span><br><span class="line">        <span class="keyword">if</span>(!Ist[i])</span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> j=max(<span class="number">0</span>,m-fly[i<span class="number">-1</span>])+<span class="number">1</span>;j&lt;=m;++j)</span><br><span class="line">                dp[i][m]=min(dp[i][m],dp[i<span class="number">-1</span>][j]+<span class="number">1</span>);</span><br><span class="line">        <span class="keyword">else</span> </span><br><span class="line">            <span class="keyword">for</span>(<span class="keyword">int</span> j=dt[i]+<span class="number">1</span>;j&lt;ut[i];++j)</span><br><span class="line">                <span class="keyword">if</span>(dp[i][j]&lt;INF)&#123;</span><br><span class="line">                    ++failAns;</span><br><span class="line">                    <span class="keyword">break</span>;</span><br><span class="line">                &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">int</span> ans=INF;<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=m;++i)ans=min(ans,dp[n][i]);</span><br><span class="line">    <span class="keyword">if</span>(ans&lt;INF)<span class="built_in">cout</span>&lt;&lt;<span class="string">"1"</span>&lt;&lt;<span class="built_in">endl</span>&lt;&lt;ans&lt;&lt;<span class="built_in">endl</span>;</span><br><span class="line">    <span class="keyword">else</span> <span class="built_in">cout</span>&lt;&lt;<span class="string">"0"</span>&lt;&lt;<span class="built_in">endl</span>&lt;&lt;failAns&lt;&lt;<span class="built_in">endl</span>;</span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

	</p>

					<p><strong>树堆</strong>，在数据结构中也称<strong>Treap</strong>，是指有一个随机附加域满足堆的性质的二叉搜索树，其结构相当于以随机数据插入的二叉搜索树。</p>
<a id="more"></a>
<p><em>Usage</em></p>
<p>treap是一种常用易写的平衡树，单从字母意思来看，treap=tree+heap。适用于BST被卡的题目..</p>
<p>实现方法：<a href="http://www.zjdx1998.ml/2018/08/02/2018SummerHZOI/#Treap" target="_blank" rel="noopener">zjd</a></p>
<p><em>Code</em></p>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">treap</span>&#123;</span></span><br><span class="line">        <span class="keyword">private</span>:</span><br><span class="line">                <span class="keyword">int</span> tot;</span><br><span class="line">                <span class="class"><span class="keyword">class</span> <span class="title">leaf</span>&#123;</span></span><br><span class="line">                        <span class="keyword">public</span>:</span><br><span class="line">                                <span class="keyword">int</span> size,data,pri,cnt,son[<span class="number">2</span>];</span><br><span class="line">                                <span class="function"><span class="keyword">void</span> <span class="title">init</span><span class="params">(<span class="keyword">int</span> x,<span class="keyword">int</span> y)</span></span>&#123;</span><br><span class="line">                                        size=<span class="number">1</span>;</span><br><span class="line">                                        data=x;</span><br><span class="line">                                        pri=y;</span><br><span class="line">                                        cnt=<span class="number">1</span>;</span><br><span class="line">                                &#125;</span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> size(i) s[i].size</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> data(i) s[i].data</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> pri(i) s[i].pri</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> cnt(i) s[i].cnt</span></span><br><span class="line">                                <span class="meta">#<span class="meta-keyword">define</span> son(i,j) s[i].son[j]</span></span><br><span class="line">                &#125;s[MAXN];</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">update</span><span class="params">(<span class="keyword">int</span> i)</span></span>&#123;</span><br><span class="line">                        size(i)=size(son(i,<span class="number">0</span>))+size(son(i,<span class="number">1</span>))+cnt(i);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">rotate</span><span class="params">(<span class="keyword">int</span> &amp;r,<span class="keyword">int</span> f)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">int</span> l=son(r,f);</span><br><span class="line">                        son(r,f)=son(l,!f);</span><br><span class="line">                        son(l,!f)=r;</span><br><span class="line">                        update(r);</span><br><span class="line">                        update(r=l);</span><br><span class="line">                &#125;</span><br><span class="line">        <span class="keyword">public</span>:</span><br><span class="line">                <span class="keyword">int</span> root;</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">insert</span><span class="params">(<span class="keyword">int</span> &amp;i,<span class="keyword">int</span> data)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(!i)&#123;</span><br><span class="line">                                s[i=++tot].init(data,rand());</span><br><span class="line">                                <span class="keyword">return</span>;</span><br><span class="line">                        &#125;</span><br><span class="line">                        <span class="keyword">if</span>(data==data(i))</span><br><span class="line">                                cnt(i)++;</span><br><span class="line">                        <span class="keyword">else</span>&#123;</span><br><span class="line">                                <span class="keyword">int</span> f=data&gt;data(i);</span><br><span class="line">                                insert(son(i,f),data);</span><br><span class="line">                                <span class="keyword">if</span>(pri(son(i,f))&gt;pri(i))</span><br><span class="line">                                        rotate(i,f);</span><br><span class="line">                        &#125;</span><br><span class="line">                        update(i);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">void</span> <span class="title">delet</span><span class="params">(<span class="keyword">int</span> &amp;i,<span class="keyword">int</span> data)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(!i)</span><br><span class="line">                                <span class="keyword">return</span>;</span><br><span class="line">                        <span class="keyword">if</span>(data==data(i))&#123;</span><br><span class="line">                                <span class="keyword">if</span>(cnt(i)&gt;<span class="number">1</span>)</span><br><span class="line">                                        cnt(i)--,update(i);</span><br><span class="line">                                <span class="keyword">else</span> <span class="keyword">if</span>(!son(i,<span class="number">0</span>)*son(i,<span class="number">1</span>))</span><br><span class="line">                                        i=son(i,<span class="number">0</span>)+son(i,<span class="number">1</span>);</span><br><span class="line">                                <span class="keyword">else</span>&#123;</span><br><span class="line">                                        <span class="keyword">int</span> f=pri(son(i,<span class="number">1</span>))&gt;pri(son(i,<span class="number">0</span>));</span><br><span class="line">                                        rotate(i,f);</span><br><span class="line">                                        delet(i,data);</span><br><span class="line">                                &#125;</span><br><span class="line">                        &#125;</span><br><span class="line">                        <span class="keyword">else</span>&#123;</span><br><span class="line">                                delet(son(i,data&gt;data(i)),data);</span><br><span class="line">                                update(i);</span><br><span class="line">                        &#125;</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">int</span> <span class="title">query</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> data)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(!i)</span><br><span class="line">                                <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">                        <span class="keyword">if</span>(data==data(i))</span><br><span class="line">                                <span class="keyword">return</span> size(son(i,<span class="number">0</span>))+<span class="number">1</span>;</span><br><span class="line">                        <span class="keyword">int</span> f=(data&gt;data(i))?size(son(i,<span class="number">0</span>))+cnt(i):<span class="number">0</span>;</span><br><span class="line">                        <span class="keyword">return</span> f+query(son(i,data&gt;data(i)),data);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">int</span> <span class="title">rank</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> p)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(!i)</span><br><span class="line">                                <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">                        <span class="keyword">if</span>(size(son(i,<span class="number">0</span>))+<span class="number">1</span>==p)</span><br><span class="line">                                <span class="keyword">return</span> data(i);</span><br><span class="line">                        p-=(size(son(i,<span class="number">0</span>))&lt;p)?size(son(i,<span class="number">0</span>))+cnt(i):<span class="number">0</span>;</span><br><span class="line">                        <span class="keyword">return</span> rank(son(i,size(son(i,<span class="number">0</span>))&lt;p),p);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">int</span> <span class="title">prev</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> data)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(!i)</span><br><span class="line">                                <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">                        <span class="keyword">if</span>(data&gt;data(i))</span><br><span class="line">                                <span class="keyword">return</span> <span class="built_in">std</span>::max(data(i),prev(son(i,<span class="number">1</span>),data));</span><br><span class="line">                        <span class="keyword">if</span>(data&lt;=data(i))</span><br><span class="line">                                <span class="keyword">return</span> prev(son(i,<span class="number">0</span>),data);</span><br><span class="line">                &#125;</span><br><span class="line">                <span class="function"><span class="keyword">int</span> <span class="title">succ</span><span class="params">(<span class="keyword">int</span> i,<span class="keyword">int</span> data)</span></span>&#123;</span><br><span class="line">                        <span class="keyword">if</span>(!i)</span><br><span class="line">                                <span class="keyword">return</span> <span class="number">0x3f3f3f3f</span>;</span><br><span class="line">                        <span class="keyword">if</span>(data&lt;data(i))</span><br><span class="line">                                <span class="keyword">return</span> <span class="built_in">std</span>::min(data(i),succ(son(i,<span class="number">0</span>),data));</span><br><span class="line">                        <span class="keyword">if</span>(data&gt;=data(i))</span><br><span class="line">                                <span class="keyword">return</span> succ(son(i,<span class="number">1</span>),data);</span><br><span class="line">                &#125;</span><br><span class="line">&#125;tree;</span><br></pre></td></tr></table></figure>

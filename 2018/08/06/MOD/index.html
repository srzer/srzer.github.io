					<p><em>Description</em></p>
<blockquote>
<p>求a的b次方模k的值，a,b及k*k均是小于231的正整数。</p>
</blockquote>
<a id="more"></a>
<p><em>Analysis</em></p>
<p>利用x^k^=(x ^i^)^(k/i)^，很容易想到通过修改a和k，快速求出a^b^，而将k不断的除以一个数，除以2无疑是高效的。每次把k/2，a就取二次幂，一旦2无法整除k，再利用x·x^k-1^=x^k^，将ans乘上一个此时的a，再做上述处理。</p>
<p><em>Code</em></p>
<figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">&lt;bits/stdc++.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> ll long long</span></span><br><span class="line"> </span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> <span class="built_in">std</span>;</span><br><span class="line"> </span><br><span class="line">ll a,b,k,ans;</span><br><span class="line"> </span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">      freopen(<span class="string">"mod.in"</span>,<span class="string">"r"</span>,<span class="built_in">stdin</span>);</span><br><span class="line">      freopen(<span class="string">"mod.out"</span>,<span class="string">"w"</span>,<span class="built_in">stdout</span>);</span><br><span class="line">      <span class="built_in">cin</span>&gt;&gt;a&gt;&gt;b&gt;&gt;k;</span><br><span class="line">      <span class="built_in">cout</span>&lt;&lt;a&lt;&lt;<span class="string">"^"</span>&lt;&lt;b&lt;&lt;<span class="string">" mod "</span>&lt;&lt;k&lt;&lt;<span class="string">"="</span>;<span class="comment">//按格式输出</span></span><br><span class="line">      ans=<span class="number">1</span>;</span><br><span class="line">      <span class="keyword">while</span>(b)</span><br><span class="line">      &#123;</span><br><span class="line">            <span class="keyword">if</span>((b&amp;<span class="number">1</span>))ans=(ans*a)%k;<span class="comment">//如果b是奇数要乘一下a</span></span><br><span class="line">            b/=<span class="number">2</span>;</span><br><span class="line">            a=(a*a)%k;<span class="comment">//a平方</span></span><br><span class="line">      &#125;</span><br><span class="line">      <span class="built_in">cout</span>&lt;&lt;ans&lt;&lt;<span class="built_in">endl</span>;</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

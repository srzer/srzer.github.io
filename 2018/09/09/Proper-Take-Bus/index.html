lass="params">()</span></span>&#123;</span><br><span class="line">	freopen(<span class="string">"travel.in"</span>,<span class="string">"r"</span>,<span class="built_in">stdin</span>);</span><br><span class="line">	freopen(<span class="string">"travel.out"</span>,<span class="string">"w"</span>,<span class="built_in">stdout</span>);</span><br><span class="line">	<span class="built_in">std</span>::<span class="built_in">cin</span>&gt;&gt;m&gt;&gt;n;</span><br><span class="line">	<span class="built_in">memset</span>(dis,<span class="number">0x3f</span>,<span class="keyword">sizeof</span>(dis));</span><br><span class="line">	<span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">1</span>;i&lt;=n;i++)</span><br><span class="line">		dis[i][i]=<span class="number">1</span>;</span><br><span class="line">	getline(<span class="built_in">std</span>::<span class="built_in">cin</span>,line);</span><br><span class="line">	<span class="keyword">while</span>(m--)&#123;</span><br><span class="line">		getline(<span class="built_in">std</span>::<span class="built_in">cin</span>,line);</span><br><span class="line">		<span class="built_in">memset</span>(num,<span class="number">0</span>,<span class="keyword">sizeof</span>(num));</span><br><span class="line">		<span class="keyword">int</span> len=line.size(),sub=<span class="number">0</span>;</span><br><span class="line">		<span class="keyword">while</span>(<span class="number">1</span>)&#123;</span><br><span class="line">			<span class="keyword">while</span>(line[sub]&lt;<span class="string">'0'</span>||line[sub]&gt;<span class="string">'9'</span>)</span><br><span class="line">				sub++;</span><br><span class="line">			<span class="keyword">if</span>(sub&gt;=len)</span><br><span class="line">				<span class="keyword">break</span>;</span><br><span class="line">			++num[<span class="number">0</span>];</span><br><span class="line">			<span class="keyword">while</span>(line[sub]&gt;=<span class="string">'0

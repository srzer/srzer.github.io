<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Vibe Farm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    h1 {
      color: #f5e642;
      font-size: 18px;
      margin-bottom: 6px;
      text-shadow: 2px 2px #c8a400;
      letter-spacing: 3px;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 4px solid #5a3e1b;
      box-shadow: 0 0 24px rgba(245,230,66,0.25);
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 74px);
    }
    #tip { color: #888; font-size: 11px; margin-top: 6px; letter-spacing: 1px; }
  </style>
</head>
<body>
<h1>🌾 Vibe Farm 🌾</h1>
<canvas id="c"></canvas>
<div id="tip">WASD / ↑↓←→ move · Space to ride seesaw · Bunny eats carrots</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const T = 24;            // tile size
// ── 世界（约为原来的两倍）与相机视口 ──────────────────
const COLS = 48;         // 世界宽（原 34）
const ROWS = 34;         // 世界高（原 24）   48×34 = 原 816 格的 2 倍
const WORLD_W = T * COLS; // 1152
const WORLD_H = T * ROWS; // 816
const VIEW_COLS = 34;    // 屏幕可见宽
const VIEW_ROWS = 24;    // 屏幕可见高
const VW = T * VIEW_COLS; // 816 画布宽
const VH = T * VIEW_ROWS; // 576 画布高
const W = VW, H = VH;    // 兼容旧引用（清屏用屏幕尺寸）
canvas.width  = VW;
canvas.height = VH;
const cam = { x:0, y:0 }; // 相机左上角（世界坐标），平滑跟随兔叽

// ── 可复用位置（生成地图前先定义，方便清出空地）──────
const GARDEN   = {x:31*T, y:2*T, w:7*T, h:4*T};
const FOUNTAIN = {x:18*T, y:13*T, cycle:260, spray:90};
const SEESAW   = {x:7*T,  y:4.6*T, active:0, cooldown:0, guest:null, seated:false, playT:0};
const NESTS = {
  dog:     {x:4*T,  y:18*T},
  cat:     {x:41*T, y:17*T},
  chicken: {x:34*T, y:27*T},
};

// ── 确定性随机（保证地图布局每次一致）────────────────
let _seed = 20240607;
function rnd(){ _seed = (_seed*1103515245 + 12345) & 0x7fffffff; return _seed / 0x7fffffff; }
function ri(n){ return Math.floor(rnd()*n); }

// 0=草 1=泥土 2=水 3=栅栏 4=树 5=花 6=小屋地板 7=石头 8=作物 9=路
const MAP = [];
for(let y=0;y<ROWS;y++) MAP.push(new Array(COLS).fill(0));

function inB(x,y){ return x>0 && y>0 && x<COLS-1 && y<ROWS-1; }
function setT(x,y,t){ if(inB(x,y)) MAP[y][x]=t; }
function rectT(x0,y0,w,h,t){ for(let y=y0;y<y0+h;y++) for(let x=x0;x<x0+w;x++) setT(x,y,t); }

// 有机形状的池塘
function pond(cx,cy,rx,ry){
  for(let y=cy-ry;y<=cy+ry;y++) for(let x=cx-rx;x<=cx+rx;x++){
    const dx=(x-cx)/rx, dy=(y-cy)/ry;
    if(dx*dx+dy*dy <= 1 + (rnd()-0.5)*0.22) setT(x,y,2);
  }
}
// 作物田：泥土底 + 间隔种作物
function field(x0,y0,w,h){
  for(let y=y0;y<y0+h;y++) for(let x=x0;x<x0+w;x++){
    if(!inB(x,y)) continue;
    setT(x,y, ((x-x0)%2===1 && (y-y0)%2===1) ? 8 : 1);
  }
}
// 折线小路（绕开水面）
function path(x0,y0,x1,y1){
  let x=x0,y=y0;
  const lay=()=>{ if(inB(x,y) && MAP[y][x]!==2 && MAP[y][x]!==1 && MAP[y][x]!==8) setT(x,y,9); };
  while(x!==x1){ lay(); x+=x<x1?1:-1; }
  while(y!==y1){ lay(); y+=y<y1?1:-1; }
  lay();
}

// 边界栅栏
for(let x=0;x<COLS;x++){ MAP[0][x]=3; MAP[ROWS-1][x]=3; }
for(let y=0;y<ROWS;y++){ MAP[y][0]=3; MAP[y][COLS-1]=3; }

// 两块作物田
field(10,9,6,6);
field(31,21,7,6);
// 池塘：中下方大池 + 右上小池
pond(18,22,5,4);
pond(41,5,3,2);
// 果园（留出空隙，动物可穿行）
for(let y=8;y<=15;y++) for(let x=39;x<=45;x++)
  if((x+y)%2===0 && rnd()<0.72) setT(x,y,4);
// 随机散布：树 / 石头 / 花（仅落在草地上）
for(let i=0;i<24;i++){ const x=3+ri(COLS-6), y=3+ri(ROWS-6); if(MAP[y][x]===0) setT(x,y,4); }
for(let i=0;i<22;i++){ const x=2+ri(COLS-4), y=2+ri(ROWS-4); if(MAP[y][x]===0) setT(x,y,7); }
for(let i=0;i<70;i++){ const x=2+ri(COLS-4), y=2+ri(ROWS-4); if(MAP[y][x]===0) setT(x,y,5); }

// 道路网（出生区 → 喷泉中心 → 各景点）
path(3,6, 18,14);
path(18,14, 13,11);
path(18,14, 36,23);
path(18,14, 33,5);
path(18,14, 41,14);
path(18,14, 6,19);
path(33,5, 41,5);

// 清出关键设施所在地的空地，避免被随机物占用
rectT(1,1,6,5,0);                                   // 出生围栏
MAP[5][3]=9;                                        // 围栏出口小路
rectT(17,12,4,4,0);                                 // 喷泉
rectT(7,4,3,3,0);                                   // 跷跷板
rectT(GARDEN.x/T,GARDEN.y/T, GARDEN.w/T, GARDEN.h/T, 0); // 花园
rectT(4,18,3,2,0);                                  // 狗窝
rectT(41,17,3,2,0);                                 // 猫窝
rectT(34,27,3,2,0);                                 // 鸡窝

// ── 地图绘制颜色 ──────────────────────────────────────
const TCOL = {
  0: ['#6bc96b','#5db85d'],
  1: ['#c2845a','#ae7048'],
  2: ['#5aa8e8','#4a98d8'],
  3: ['#9a6835','#7a5025'],
  6: ['#e0c080','#d0b070'],
  9: ['#d7b06a','#c99d58'],
};

const CARROTS = [
  {x:9*T,    y:7*T,   eaten:false},
  {x:25*T,   y:8*T,   eaten:false},
  {x:38*T,   y:21*T,  eaten:false},
  {x:6*T,    y:25*T,  eaten:false},
  {x:27*T,   y:29*T,  eaten:false},
  {x:44*T,   y:24*T,  eaten:false},
  {x:21*T,   y:16*T,  eaten:false},
  {x:36*T,   y:11*T,  eaten:false},
];

const GRASS_PATCHES = [
  {x:23*T,   y:10*T,  eaten:false, regrow:0},
  {x:30*T,   y:15*T,  eaten:false, regrow:0},
  {x:35*T,   y:18*T,  eaten:false, regrow:0},
  {x:8*T,    y:23*T,  eaten:false, regrow:0},
  {x:14*T,   y:27*T,  eaten:false, regrow:0},
  {x:26*T,   y:5*T,   eaten:false, regrow:0},
  {x:44*T,   y:28*T,  eaten:false, regrow:0},
  {x:13*T,   y:17*T,  eaten:false, regrow:0},
];

const FLOATS = [];
const EFFECTS = [];
const POOPS = [];

const CRITTERS = [
  {type:'dog', name:'小狗', coat:'brown', x:6*T,  y:20*T,   dir:1, dx:0.35, dy:0,    timer:40,  talkT:20, bubble:'', step:0, poopEvery:520},
  {type:'dog', name:'白狗', coat:'white', x:42*T, y:24*T,   dir:0, dx:-0.32, dy:0,    timer:60,  talkT:50, bubble:'', step:0},
  {type:'cat', name:'小猫', x:40*T, y:16*T,   dir:0, dx:-0.3, dy:0.15, timer:80,  talkT:55, bubble:'', step:0, poopEvery:500},
  {type:'bee', name:'蜜叽', x:33*T, y:4*T,    dir:1, dx:0.55, dy:0.15, timer:20,  talkT:35, bubble:'', phase:0, step:0},
  {type:'chicken', name:'小鸡', x:34*T, y:26*T, dir:1, dx:0.28, dy:0,  timer:110, talkT:75, bubble:'', step:0, poopEvery:480},
];

// ── 像素画工具 ────────────────────────────────────────
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }

// ── 画兔叽 (24×28px) ─────────────────────────────────
// dir: 0=上 1=右 2=下 3=左
function drawRabbit(rx, ry, dir, frame, isPlayer){
  const ox = Math.floor(rx), oy = Math.floor(ry);
  // 颜色
  const W1 = isPlayer ? '#ffffff' : '#f0e8ff';
  const W2 = isPlayer ? '#e8e8e8' : '#e0d0f8';
  const EAR = '#ffb8d0';
  const NOSE= '#ff7090';
  const EYE = '#222';
  const SHINE='#ffffff';
  const LEG = isPlayer ? '#d8d8d8' : '#c8b8f0';
  const TAIL= '#ffffff';

  // 腿偏移（行走动画）
  const lA = frame===1 ?  2 : 0;
  const lB = frame===1 ? -2 : 0;  // 反相

  if(dir===2){ // 正面
    // 左腿
    px(ox+3,  oy+22+lA, 5,6, LEG);
    // 右腿
    px(ox+13, oy+22+lB, 5,6, LEG);
    // 身体
    px(ox+2,  oy+12, 17,12, W2);
    px(ox+3,  oy+11, 15,13, W1);
    // 头
    px(ox+4,  oy+2,  13,13, W1);
    px(ox+3,  oy+4,  15,11, W1);
    // 耳朵
    px(ox+5,  oy-8,  4,12, W2);
    px(ox+6,  oy-7,  2,10, EAR);
    px(ox+12, oy-8,  4,12, W2);
    px(ox+13, oy-7,  2,10, EAR);
    // 眼睛
    px(ox+6,  oy+6,  3,3, EYE);
    px(ox+7,  oy+6,  1,1, SHINE);
    px(ox+12, oy+6,  3,3, EYE);
    px(ox+13, oy+6,  1,1, SHINE);
    // 鼻子
    px(ox+9,  oy+10, 3,2, NOSE);
    // 腮红
    px(ox+4,  oy+9,  3,3, '#ffb0b0');
    px(ox+14, oy+9,  3,3, '#ffb0b0');
    // 尾巴
    px(ox+17, oy+14, 5,5, TAIL);
  } else if(dir===0){ // 背面
    px(ox+3,  oy+22+lA, 5,6, LEG);
    px(ox+13, oy+22+lB, 5,6, LEG);
    px(ox+2,  oy+12, 17,12, W2);
    px(ox+3,  oy+11, 15,13, W1);
    px(ox+4,  oy+2,  13,13, W1);
    px(ox+3,  oy+4,  15,11, W1);
    px(ox+5,  oy-8,  4,12, W2);
    px(ox+6,  oy-7,  2,10, EAR);
    px(ox+12, oy-8,  4,12, W2);
    px(ox+13, oy-7,  2,10, EAR);
    // 后脑不露眼
    px(ox+7,  oy+7,  3,2, W2); // 假发线
    px(ox+11, oy+7,  3,2, W2);
    px(ox+10, oy+14, 5,5, TAIL);
  } else if(dir===1){ // 右
    px(ox+14, oy+22+lA, 5,6, LEG);
    px(ox+14, oy+22+lB, 5,6, LEG);
    px(ox+4,  oy+12, 14,12, W2);
    px(ox+5,  oy+11, 12,13, W1);
    px(ox+6,  oy+2,  12,13, W1);
    px(ox+5,  oy+4,  13,11, W1);
    // 侧耳
    px(ox+11, oy-8,  4,12, W2);
    px(ox+12, oy-7,  2,10, EAR);
    // 侧眼
    px(ox+14, oy+6,  3,3, EYE);
    px(ox+15, oy+6,  1,1, SHINE);
    // 鼻子
    px(ox+17, oy+10, 2,2, NOSE);
    // 腮红
    px(ox+15, oy+9,  2,3, '#ffb0b0');
    // 尾巴
    px(ox+2,  oy+14, 5,5, TAIL);
  } else { // 左
    px(ox+2,  oy+22+lA, 5,6, LEG);
    px(ox+2,  oy+22+lB, 5,6, LEG);
    px(ox+3,  oy+12, 14,12, W2);
    px(ox+4,  oy+11, 12,13, W1);
    px(ox+3,  oy+2,  12,13, W1);
    px(ox+3,  oy+4,  13,11, W1);
    px(ox+6,  oy-8,  4,12, W2);
    px(ox+7,  oy-7,  2,10, EAR);
    px(ox+3,  oy+6,  3,3, EYE);
    px(ox+4,  oy+6,  1,1, SHINE);
    px(ox+2,  oy+10, 2,2, NOSE);
    px(ox+4,  oy+9,  2,3, '#ffb0b0');
    px(ox+14, oy+14, 5,5, TAIL);
  }
}

// ── 画羊叽 (22×18px sprite) ──────────────────────────
function drawSheep(sx, sy, dir){
  const ox=Math.floor(sx), oy=Math.floor(sy);
  const W1='#f5f2ee', W2='#ece8e2', W3='#ddd8d0';
  const SKIN='#d4c4a8', DARK='#b8a888', EYE='#333', SHINE='#fff';
  const HOOF='#7a6a50';

  // 蹄子
  px(ox+3, oy+14, 4,4, HOOF);
  px(ox+15,oy+14, 4,4, HOOF);

  // 身体羊毛（多层叠加感）
  px(ox+2, oy+4,  18,12, W3);
  px(ox+1, oy+3,  20,12, W2);
  px(ox+2, oy+2,  18,11, W1);
  px(ox+3, oy+1,  16,10, W1);
  // 高光点缀
  px(ox+5, oy+2,  3,2, '#ffffff');
  px(ox+12,oy+3,  2,2, '#ffffff');

  if(dir===1){ // 头朝右
    // 头
    px(ox+15,oy+2,  8,8, SKIN);
    px(ox+14,oy+3,  9,7, SKIN);
    // 吻部
    px(ox+20,oy+6,  3,4, DARK);
    // 眼睛
    px(ox+16,oy+4,  3,3, EYE);
    px(ox+17,oy+4,  1,1, SHINE);
    // 耳朵
    px(ox+14,oy+2,  3,5, SKIN);
    px(ox+15,oy+3,  2,3, DARK);
    // 犄角
    px(ox+17,oy+0,  2,3, '#c8b898');
    px(ox+18,oy-1,  2,2, '#b8a888');
  } else { // 头朝左
    px(ox-1, oy+2,  8,8, SKIN);
    px(ox-1, oy+3,  9,7, SKIN);
    px(ox-3, oy+6,  3,4, DARK);
    px(ox+3, oy+4,  3,3, EYE);
    px(ox+3, oy+4,  1,1, SHINE);
    px(ox+5, oy+2,  3,5, SKIN);
    px(ox+5, oy+3,  2,3, DARK);
    px(ox+3, oy+0,  2,3, '#c8b898');
    px(ox+2, oy-1,  2,2, '#b8a888');
  }
}

function drawDog(x,y,dir,frame,coat){
  const ox=Math.floor(x), oy=Math.floor(y);
  const C = coat==='white'
    ? {fur:'#f3f1ea', body:'#e6e1d6', dark:'#c2bbac', cream:'#ffe7c6', eye:'#3a2a1a', nose:'#5a4636'}
    : {fur:'#b87534', body:'#c9863d', dark:'#70451f', cream:'#f0c98a', eye:'#20160f', nose:'#111'};
  const step=frame ? 1 : 0;
  px(ox+3, oy+14+step, 4,4, C.dark);
  px(ox+14,oy+14-step, 4,4, C.dark);
  px(ox+4, oy+8,  15,8, C.fur);
  px(ox+6, oy+6,  11,7, C.body);
  px(ox+1, oy+10, 5,4, C.dark);
  px(ox+17,oy+9,  5,5, C.fur);
  if(dir===1){
    px(ox+16,oy+4, 8,8, C.fur);
    px(ox+19,oy+7, 4,3, C.cream);
    px(ox+18,oy+2, 3,5, C.dark);
    px(ox+17,oy+6, 2,2, C.eye);
    px(ox+23,oy+9, 2,2, C.nose);
    px(ox+2, oy+7, 3,3, C.dark);
  } else {
    px(ox-2, oy+4, 8,8, C.fur);
    px(ox-1, oy+7, 4,3, C.cream);
    px(ox+3, oy+2, 3,5, C.dark);
    px(ox+4, oy+6, 2,2, C.eye);
    px(ox-3, oy+9, 2,2, C.nose);
    px(ox+19,oy+7, 3,3, C.dark);
  }
}

function drawCat(x,y,dir,frame){
  const ox=Math.floor(x), oy=Math.floor(y);
  const fur='#6f737a', light='#bfc3c8', eye='#ffe66b', pink='#f0a0b0';
  const step=frame ? 1 : 0;
  px(ox+4, oy+14+step, 3,4, '#444950');
  px(ox+14,oy+14-step, 3,4, '#444950');
  px(ox+4, oy+8, 14,8, fur);
  px(ox+6, oy+9, 8,5, light);
  px(ox+16,oy+6, 4,3, fur);
  px(ox+19,oy+5, 3,3, fur);
  if(dir===1){
    px(ox+13,oy+3, 9,9, fur);
    px(ox+14,oy+0, 3,4, fur);
    px(ox+19,oy+0, 3,4, fur);
    px(ox+16,oy+7, 2,2, eye);
    px(ox+21,oy+8, 2,1, pink);
  } else {
    px(ox-1, oy+3, 9,9, fur);
    px(ox,  oy+0, 3,4, fur);
    px(ox+5, oy+0, 3,4, fur);
    px(ox+4, oy+7, 2,2, eye);
    px(ox-2, oy+8, 2,1, pink);
  }
}

function drawBee(x,y,dir,tick){
  const ox=Math.floor(x), oy=Math.floor(y+Math.sin(tick*0.16)*2);
  const wing=tick%12<6;
  px(ox+5, oy+5+(wing?0:1), 6,4, 'rgba(210,245,255,0.72)');
  px(ox+11,oy+5+(wing?1:0), 6,4, 'rgba(210,245,255,0.72)');
  px(ox+6, oy+10, 12,7, '#ffd441');
  px(ox+8, oy+10, 2,7, '#302010');
  px(ox+13,oy+10, 2,7, '#302010');
  px(ox+16,oy+12, 3,2, '#302010');
  px(ox+4, oy+12, 3,3, '#302010');
}

function drawChicken(x,y,dir,frame){
  const ox=Math.floor(x), oy=Math.floor(y);
  const body='#fff4dc', shade='#e8d8b8', red='#d93624', beak='#f0a020';
  const step=frame ? 1 : 0;
  px(ox+6, oy+14+step, 2,5, '#d08024');
  px(ox+13,oy+14-step, 2,5, '#d08024');
  px(ox+4, oy+7, 14,10, shade);
  px(ox+5, oy+6, 12,10, body);
  px(ox+8, oy+8, 6,4, '#ffffff');
  if(dir===1){
    px(ox+14,oy+4, 7,8, body);
    px(ox+16,oy+1, 2,3, red);
    px(ox+19,oy+2, 2,3, red);
    px(ox+17,oy+7, 2,2, '#222');
    px(ox+21,oy+8, 4,2, beak);
    px(ox+15,oy+11, 4,3, red);
  } else {
    px(ox+1, oy+4, 7,8, body);
    px(ox+3, oy+1, 2,3, red);
    px(ox+5, oy+2, 2,3, red);
    px(ox+5, oy+7, 2,2, '#222');
    px(ox-3, oy+8, 4,2, beak);
    px(ox+4, oy+11,4,3, red);
  }
}

function drawCritter(c){
  const frame=(tick>>4)&1;
  if(c.type==='dog') drawDog(c.x,c.y,c.dir,frame,c.coat);
  else if(c.type==='cat') drawCat(c.x,c.y,c.dir,frame);
  else if(c.type==='bee') drawBee(c.x,c.y,c.dir,tick);
  else if(c.type==='chicken') drawChicken(c.x,c.y,c.dir,frame);
}

function drawSeesaw(){
  const x=SEESAW.x, y=SEESAW.y;
  const tilt=SEESAW.active>0 ? Math.sin(tick*0.15)*9 : 0;
  px(x+19,y+27,18,4,'rgba(0,0,0,0.18)');
  px(x+23,y+20,10,7,'#6a4424');
  px(x+25,y+16,7,8,'#8a5a30');

function createPoop(c){
  const p={x:c.x+5,y:c.y+8,owner:c.type,burying:false};
  POOPS.push(p);
  c.step=0;
  c.bubble=c.type==='cat'?'埋起来':c.type==='bee'?'小粑粑':'拉粑粑';
  c.bubT=100;
  addFloat(c.x+2,c.y-8,'留下了','#c99d58');
  if(c.type==='cat'){
    c.mode='buryPoop';
    c.buryT=180;
    c.buryPoop=p;
    p.burying=true;
  }
}

function nearestEdiblePoop(dog){
  let best=null, bestD=Infinity;
  for(const p of POOPS){
    if(p.burying) continue;
    if(solidAt(p.x+10,p.y+16)) continue;
    const d=dist(dog.x+10,dog.y+10,p.x+10,p.y+10);
    if(d<bestD){ best=p; bestD=d; }
  }
  return best ? {poop:best,distance:bestD} : null;
}

function noticeDirtyPoop(c){
  if(c.type==='dog' || c.dirtyCd>0) return;
  for(const p of POOPS){
    if(p.burying) continue;
    if(dist(c.x+10,c.y+10,p.x+10,p.y+10)<T*3){
      c.bubble='好脏';
      c.bubT=85;
      c.dirtyCd=180;
      return;
    }
  }
}

function addFireworkEffect(x,y){
  const colors=['#ffe66b','#ff7a4f','#8ef0ff','#b78cff','#ffffff'];
  for(let i=0;i<18;i++){

    addFireworkEffect(x,y);

function updateEffects(){
  for(let i=EFFECTS.length-1;i>=0;i--){
    const e=EFFECTS[i];
    e.x+=e.vx;
    e.y+=e.vy;
    if(e.type==='spark') e.vy+=0.035;
    e.life--;
    if(e.life<=0) EFFECTS.splice(i,1);
  }
}

// ── 碰撞 ─────────────────────────────────────────────
function tileAt(wx, wy){
  const tx=Math.floor(wx/T), ty=Math.floor(wy/T);
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS) return 3;
  return MAP[ty][tx];
}

function pointInRect(px,py,r){
  return px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h;
}

function decorativeSolidAt(wx,wy){
  const rects=[];

  // 兔叽出生地小木桩围栏，底部中间留门。
  const sx=T, sy=T, sw=6*T, sh=5*T;
  const gateX=sx+2*T+8, gateW=T+8;
  rects.push({x:sx,y:sy,w:sw,h:18});
  rects.push({x:sx,y:sy,w:16,h:sh});
  rects.push({x:sx+sw-16,y:sy,w:16,h:sh});
  rects.push({x:sx,y:sy+sh-18,w:gateX-sx,h:18});
  rects.push({x:gateX+gateW,y:sy+sh-18,w:sx+sw-(gateX+gateW),h:18});

  // 花园栅栏，底边中间留门给兔叽和地面动物。
  const gx=GARDEN.x, gy=GARDEN.y, gw=GARDEN.w, gh=GARDEN.h;
  const gardenGateX=gx+gw/2-12, gardenGateW=24;
  rects.push({x:gx,y:gy,w:gw,h:18});
  rects.push({x:gx,y:gy,w:15,h:gh});
  rects.push({x:gx+gw-15,y:gy,w:15,h:gh});
  rects.push({x:gx,y:gy+gh-16,w:gardenGateX-gx,h:16});
  rects.push({x:gardenGateX+gardenGateW,y:gy+gh-16,w:gx+gw-(gardenGateX+gardenGateW),h:16});

  // 音乐喷泉底座。
  rects.push({x:FOUNTAIN.x+5,y:FOUNTAIN.y+12,w:40,h:18});

  // 小狗、小猫、小鸡的小窝。
  rects.push({x:NESTS.dog.x,y:NESTS.dog.y+4,w:34,h:22});
  rects.push({x:NESTS.cat.x,y:NESTS.cat.y+6,w:30,h:18});
  rects.push({x:NESTS.chicken.x,y:NESTS.chicken.y+3,w:32,h:21});

  return rects.some(r=>pointInRect(wx,wy,r));
}

// 水(2)不能走
function solidAt(wx,wy){
  const t=tileAt(wx,wy);
  return decorativeSolidAt(wx,wy)||t===3||t===4||t===7||t===2;
}
function solid(t){ return t===3||t===4||t===2||t===7; }

function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function sheepRect(s){
  return {x:s.x+1, y:s.y+2, w:22, h:17};
}

function playerRect(x=P.x, y=P.y){
  return {x:x+2, y:y+2, w:P.w-4, h:P.h-3};
}

function blockedBySheep(x, y){
  const next=playerRect(x,y);
  return SHEEP.some(s=>rectsOverlap(next, sheepRect(s)));
}

function rabbitHeadRect(x=P.x,y=P.y){
  return {x:x+3, y:y-8, w:18, h:23};
}

function sheepHeadRect(s){
  return s.dir===1
    ? {x:s.x+14, y:s.y+0, w:11, h:12}
    : {x:s.x-3, y:s.y+0, w:11, h:12};
}

function nearRects(a,b,pad=0){
  return rectsOverlap(
    {x:a.x-pad,y:a.y-pad,w:a.w+pad*2,h:a.h+pad*2},
    {x:b.x-pad,y:b.y-pad,w:b.w+pad*2,h:b.h+pad*2}
  );
}

const P = {
  x: 3*T, y: 3.5*T,
  w: 21, h: 28,
  speed: 0.85,
  dir: 2, frame: 0, ft: 0, moving: false,
  carrots: 0, chew: 0, interactCd: 0, headEffectCd: 0,
};

// ── NPC 羊 ───────────────────────────────────────────
const SHEEP = [
  {x:17*T, y:12.5*T, dir:1, timer:0, dx:0.45, dy:0, hunger:70, eat:0, mood:'散步', talkT:150, bubble:'', bubT:0},
];

const KEYS = {};
let SPACE_HIT=false;
document.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if(k===' ' && !KEYS[k]) SPACE_HIT=true;
  KEYS[k]=true;
  e.preventDefault();
});
document.addEventListener('keyup',   e=>{ KEYS[e.key.toLowerCase()]=false; });

function canMove(nx,ny){
  const m=3;
  const clearTiles = [
    [nx+m,     ny+m     ],
    [nx+P.w-m, ny+m     ],
    [nx+m,     ny+P.h-m ],
    [nx+P.w-m, ny+P.h-m ],
  ].every(([cx,cy])=>!solidAt(cx,cy));
  return clearTiles && !blockedBySheep(nx,ny);
}

function canSheepMove(s,nx,ny){
  const m=2;
  const clearTiles = [
    [nx+m,  ny+m ],
    [nx+22, ny+m ],
    [nx+m,  ny+18],
    [nx+22, ny+18],
  ].every(([cx,cy])=>!solidAt(cx,cy));
  return clearTiles && !rectsOverlap({x:nx+1,y:ny+2,w:22,h:17}, playerRect());
}

function chooseSheepDirection(s, speed=0.45){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2;
    const dx=Math.cos(a)*speed, dy=Math.sin(a)*speed;
    if(canSheepMove(s,s.x+dx*8,s.y+dy*8)){
      s.dx=dx; s.dy=dy;
      return;
    }
  }
  // 实在找不到可走方向：朝世界中心，避免原地震荡
  const a=Math.atan2(WORLD_H/2 - s.y, WORLD_W/2 - s.x);
  s.dx=Math.cos(a)*speed; s.dy=Math.sin(a)*speed;
}

// ── 地面动物：用脚部小范围 footprint 判断碰撞（多点采样）──
function critterSolid(x,y){
  return solidAt(x+5, y+15) || solidAt(x+16, y+15) ||
         solidAt(x+5, y+18) || solidAt(x+16, y+18);
}
// 地面动物的身体碰撞盒（小猫小狗小鸡互相不能重叠）
function critterBody(c, x=c.x, y=c.y){ return {x:x+3, y:y+7, w:18, h:13}; }
function blockedByCritter(self, x, y){
  if(self.type==='bee' || self.mode==='seesaw') return false;
  const me=critterBody(self, x, y);
  for(const o of CRITTERS){
    if(o===self || o.type==='bee' || o.mode==='seesaw') continue;
    if(rectsOverlap(me, critterBody(o))) return true;
  }
  return false;
}
// 综合：地形 + 其它动物 都算「不可走」
function blockedAt(c, x, y){ return critterSolid(x,y) || blockedByCritter(c,x,y); }
// 万一两只动物重叠（理论上不会），沿连线轻轻推开，但不穿墙
function separateCritters(c){
  if(c.type==='bee' || c.mode==='seesaw') return;
  for(const o of CRITTERS){
    if(o===c || o.type==='bee' || o.mode==='seesaw') continue;
    if(!rectsOverlap(critterBody(c), critterBody(o))) continue;
    let ax=c.x-o.x, ay=c.y-o.y;
    if(Math.abs(ax)<0.01 && Math.abs(ay)<0.01){ ax=Math.random()-0.5; ay=Math.random()-0.5; }
    const m=Math.hypot(ax,ay)||1;
    const sx=c.x+ax/m*0.8, sy=c.y+ay/m*0.8;
    if(!critterSolid(sx,sy)){ c.x=sx; c.y=sy; }
  }
}
// 被实体环绕时，选一个真正能走的新方向（彻底防卡死）
function escapeStuck(c){
  const sp = c.type==='chicken' ? 0.32 : 0.4;
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2;
    const dx=Math.cos(a)*sp, dy=Math.sin(a)*sp*0.85;
    if(!blockedAt(c, c.x+dx*12, c.y+dy*12)){
      c.dx=dx; c.dy=dy;
      c.timer=60+Math.random()*80|0;
      if(c.mode==='eatPoop'){
        c.mode=''; c.targetPoop=null; c.stuckT=0;
        // 小狗追便便被困 → 切回游走，避免立刻又盯上同一坨
        if(c.type==='dog'){ c.behavior='wander'; c.behaviorT=220+Math.random()*160|0; }
      }
      return;
    }
  }
  // 兜底：朝地图中心缓慢移动
  const a=Math.atan2(WORLD_H/2 - c.y, WORLD_W/2 - c.x);
  c.dx=Math.cos(a)*sp; c.dy=Math.sin(a)*sp; c.timer=60;
}
// 若不慎嵌入实体（理论上不该发生），向外推出
function pushOut(c){
  if(!critterSolid(c.x, c.y)) return;
  for(let r=2;r<=48;r+=2) for(let i=0;i<12;i++){
    const a=Math.PI*2*i/12;
    const nx=c.x+Math.cos(a)*r, ny=c.y+Math.sin(a)*r;
    if(!critterSolid(nx,ny)){ c.x=nx; c.y=ny; return; }
  }
}

function nearestGrass(s){
  let best=null, bestD=Infinity;
  for(const g of GRASS_PATCHES){
    if(g.eaten) continue;
    const d=dist(s.x+11,s.y+10,g.x+10,g.y+10);
    if(d<bestD){ best=g; bestD=d; }
  }
  return best ? {patch:best, distance:bestD} : null;
}

function updateCarrots(){
  const pr=playerRect();
  for(const c of CARROTS){
    if(c.eaten) continue;
    const cr={x:c.x+3,y:c.y+4,w:14,h:18};
    if(rectsOverlap(pr,cr)){
      c.eaten=true;
      P.carrots++;
      P.chew=55;
      setBubble('咔嚓！+1', 90);
      addFloat(P.x+6, P.y-10, '+胡萝卜', '#ffd28a');
    }
  }
  if(P.chew>0) P.chew--;
}

function updateGrass(){
  for(const g of GRASS_PATCHES){
    if(g.eaten && g.regrow>0){
      g.regrow--;
      if(g.regrow===0){
        g.eaten=false;
        addFloat(g.x+2, g.y+2, '新草', '#b7ff8a');
      }
    }
  }
}

function updateFloats(){
  for(let i=FLOATS.length-1;i>=0;i--){
    FLOATS[i].y-=0.25;
    FLOATS[i].life--;
    if(FLOATS[i].life<=0) FLOATS.splice(i,1);
  }
}

function updateCritters(){
  for(const c of CRITTERS){
    if(c.dirtyCd>0) c.dirtyCd--;
    if(c.mode==='buryPoop'){
      c.buryT--;
      c.dx=0; c.dy=0;
      c.bubble='埋埋埋';
      c.bubT=20;
      if(c.buryT<=0){
        const idx=POOPS.indexOf(c.buryPoop);
        if(idx>=0) POOPS.splice(idx,1);
        c.buryPoop=null;
        c.mode='';
        c.timer=0;
        c.bubble='干净了';
        c.bubT=90;
      }
      continue;
    }

    c.timer--;
    if(c.type==='bee') c.phase+=0.08;
    c.talkT--;
    if(c.talkT<=0){
      const lines=CRITTER_BUBBLES[c.type];
      c.bubble=lines[Math.random()*lines.length|0];
      c.bubT=110;
      c.talkT=110+Math.random()*170|0;
    }
    if(c.bubT>0) c.bubT--;
    if(c.type==='dog'){
      // 行为模式定时切换：随机游走 ↔ 优先吃便便。
      // 这样小狗不会长期死盯着一坨够不到的便便，从而不再卡位。
      if(c.behaviorT===undefined){ c.behavior='wander'; c.behaviorT=240+Math.random()*180|0; }
      c.behaviorT--;
      if(c.behaviorT<=0){
        if(c.behavior==='hunt'){
          c.behavior='wander';
          c.behaviorT=300+Math.random()*180|0;   // 游走 ~5–8 秒
          if(c.mode==='eatPoop'){ c.mode=''; c.targetPoop=null; c.stuckT=0; c.timer=0; }
          c.bubble='溜达溜达'; c.bubT=70;
        } else {
          c.behavior='hunt';
          c.behaviorT=360+Math.random()*180|0;    // 找便便 ~6–9 秒
          c.bubble='找找看~'; c.bubT=70;
        }
      }
      // 只有在「找便便」模式下才会去追便便
      if(c.behavior==='hunt' && !c.mode){
        const target=nearestEdiblePoop(c);
        if(target){
          c.mode='eatPoop';
          c.targetPoop=target.poop;
          c.stuckT=0;
          c.bubble='闻到了！';
          c.bubT=80;
        }
      }
    }

    if(c.mode==='eatPoop'){
      const p=c.targetPoop;
      if(!p || !POOPS.includes(p) || p.burying){
        c.mode='';
        c.targetPoop=null;
        c.stuckT=0;
        c.timer=0;
      } else {
        const a=Math.atan2(p.y-c.y,p.x-c.x);
        const side=(c.stuckT||0)>18 ? Math.sin(tick*0.18)*0.5 : 0;
        c.dx=Math.cos(a)*0.7 + Math.cos(a+Math.PI/2)*side;
        c.dy=Math.sin(a)*0.55 + Math.sin(a+Math.PI/2)*side;
        if(dist(c.x+10,c.y+10,p.x+10,p.y+10)<13){
          const idx=POOPS.indexOf(p);
          if(idx>=0) POOPS.splice(idx,1);
          c.mode='';
          c.targetPoop=null;
          c.stuckT=0;
          c.timer=0;
          c.bubble='真好吃！';
          c.bubT=120;
          addFloat(c.x+2,c.y-8,'吧唧','#ffd28a');
        }
      }
    } else if(c.mode==='seesaw'){
      const targetX=SEESAW.x+42, targetY=SEESAW.y-4;
      const a=Math.atan2(targetY-c.y,targetX-c.x);
      c.dx=Math.cos(a)*0.55;
      c.dy=Math.sin(a)*0.45;
      if(dist(c.x,c.y,targetX,targetY)<10){
        c.dx=0; c.dy=0;
        c.x=targetX; c.y=targetY;
        SEESAW.active=35;
        c.bubble=c.type==='dog'?'汪！好玩':c.type==='cat'?'喵~晃晃':'咯咯！';
        c.bubT=30;
      }
    } else if(c.type==='bee' && c.mode==='garden'){
      const targetX=GARDEN.x+GARDEN.w/2-6, targetY=GARDEN.y+GARDEN.h/2-8;
      const a=Math.atan2(targetY-c.y,targetX-c.x);
      c.dx=Math.cos(a)*0.75;
      c.dy=Math.sin(a)*0.55;
      if(dist(c.x,c.y,targetX,targetY)<12){
        c.mode='nectar';
        c.nectarT=95;
        c.bubble='采蜜！';
        c.bubT=95;
      }
    } else if(c.type==='bee' && c.mode==='nectar'){
      c.nectarT--;
      c.dx=Math.sin(tick*0.1)*0.35;
      c.dy=Math.cos(tick*0.08)*0.22;
      if(c.nectarT<=0){
        c.mode='';
        c.timer=0;
        addFloat(c.x,c.y,'+蜜','#ffe66b');
      }
    } else if(c.timer<=0){
      c.timer=70+Math.random()*130|0;
      const a=Math.random()*Math.PI*2;
      const sp=c.type==='bee' ? 0.65 : c.type==='chicken' ? 0.32 : 0.38;
      c.dx=Math.cos(a)*sp;
      c.dy=Math.sin(a)*sp*0.75;
      if(c.type==='bee' && Math.random()<0.45){
        c.mode='garden';
        c.bubble='去花园';
        c.bubT=80;
      }
    }
    const ox=c.x, oy=c.y;
    let nx=c.x+c.dx;
    let ny=c.y+c.dy+(c.type==='bee'?Math.sin(tick*0.08+c.phase)*0.12:0);

    if(c.type==='bee'){
      // 蜜蜂会飞，不受地面阻挡
      c.x=nx; c.y=ny;
      c.step+=dist(ox,oy,c.x,c.y);
    } else {
      pushOut(c);                       // 保险：绝不嵌在实体里
      if(!blockedAt(c, nx, ny)){
        c.x=nx; c.y=ny;                 // 整体可走
      } else {
        // 分轴滑动：撞树/墙角/其它动物时沿可走的轴继续走，而不是原地反弹
        if(!blockedAt(c, nx, c.y)){ c.x=nx; } else { c.dx=-c.dx; }
        if(!blockedAt(c, c.x, ny)){ c.y=ny; } else { c.dy=-c.dy; }
      }
      const adv=dist(ox,oy,c.x,c.y);
      c.step+=adv;

      // 进展检测：长时间几乎没动 → 强制换方向（保证永远不会卡死）
      if(adv<0.06) c.noProgress=(c.noProgress||0)+1; else c.noProgress=0;
      if(c.noProgress>24){ escapeStuck(c); c.noProgress=0; }

      // 吃便便够不到时：放弃，并切回游走一段时间，避免立刻又去盯同一坨
      if(c.mode==='eatPoop'){
        if(adv<0.06) c.stuckT=(c.stuckT||0)+1; else c.stuckT=0;
        if(c.stuckT>55){
          c.mode=''; c.targetPoop=null; c.stuckT=0; c.timer=0;
          c.bubble='够不到'; c.bubT=80;
          if(c.type==='dog'){ c.behavior='wander'; c.behaviorT=240+Math.random()*150|0; }
        }
      }
      separateCritters(c);              // 极端情况下也能互相推开
    }

    c.x=Math.max(T,Math.min(c.x,(COLS-2)*T-22));
    c.y=Math.max(T,Math.min(c.y,(ROWS-2)*T-18));
    if(c.x<=T || c.x>=(COLS-2)*T-22) c.dx=-c.dx;
    if(c.y<=T || c.y>=(ROWS-2)*T-18) c.dy=-c.dy;
    if(Math.abs(c.dx)>0.05) c.dir=c.dx>=0?1:0;
    noticeDirtyPoop(c);
    if(c.poopEvery && c.step>=c.poopEvery && c.mode!=='seesaw' && c.mode!=='eatPoop' && c.mode!=='garden' && c.mode!=='nectar'){
      createPoop(c);
    }
  }
}

function updateSeesaw(){
  if(SEESAW.cooldown>0) SEESAW.cooldown--;
  if(SEESAW.active>0) SEESAW.active--;
  if(SEESAW.seated){
    P.x=SEESAW.x+4;
    P.y=SEESAW.y-10;
    SEESAW.active=35;

    // 被点名的小动物延迟一小会儿回应「来啦！」
    if(SEESAW.replyT>0){
      SEESAW.replyT--;
      if(SEESAW.replyT===0 && SEESAW.guestObj){
        SEESAW.guestObj.bubble='来啦！';
        SEESAW.guestObj.bubT=85;
      }
    }

    if(SPACE_HIT){
      releaseSeesawGuest();
      SEESAW.seated=false;
      SEESAW.guest=null;
      SEESAW.guestObj=null;
      SEESAW.replyT=0;
      SEESAW.cooldown=45;
      P.x=SEESAW.x+8;
      P.y=SEESAW.y+24;
      setBubble('跳下来！',70);
      return;
    }

    if(SEESAW.guest==='sheep'){
      const s=SHEEP[0];
      if(s.mode==='seesaw'){
        const targetX=SEESAW.x+42, targetY=SEESAW.y-2;
        const a=Math.atan2(targetY-s.y,targetX-s.x);
        s.dx=Math.cos(a)*0.6;
        s.dy=Math.sin(a)*0.5;
        if(dist(s.x,s.y,targetX,targetY)<10){
          s.x=targetX; s.y=targetY;
          s.dx=0; s.dy=0;
          s.bubble='咩！高高';
          s.bubT=35;
        }
      }
    }
    return;
  }

  const near=dist(P.x+P.w/2,P.y+P.h,SEESAW.x+28,SEESAW.y+12)<34;
  if(near && SPACE_HIT && SEESAW.cooldown<=0 && !SEESAW.guest){
    const pool=[...CRITTERS.filter(c=>c.type!=='bee'), SHEEP[0]];
    const guest=pool[Math.random()*pool.length|0];
    const NAMES={dog:'小狗', cat:'小猫', chicken:'小鸡', sheep:'羊叽'};
    const guestName = guest===SHEEP[0] ? NAMES.sheep : (guest.name || NAMES[guest.type]);
    SEESAW.seated=true;
    SEESAW.playT=0;
    SEESAW.active=35;
    if(guest===SHEEP[0]){
      guest.mode='seesaw';
      guest.timer=0;
      guest.bubble=''; guest.bubT=0;
      SEESAW.guest='sheep';
    } else if(guest){
      if(guest.mode==='buryPoop' && guest.buryPoop) guest.buryPoop.burying=false;
      guest.targetPoop=null;
      guest.buryPoop=null;
      guest.mode='seesaw';
      guest.playT=0;
      guest.bubble=''; guest.bubT=0;
      SEESAW.guest=guest.type;
    }
    SEESAW.guestObj=guest;     // 记下被点名的小动物
    SEESAW.replyT=18;          // 稍后再回应「来啦！」，形成一问一答
    setBubble(guestName+'快来玩！', 95);
  }
}

function releaseSeesawGuest(){
  if(SEESAW.guest==='sheep'){
    const s=SHEEP[0];
    s.mode='';
    s.timer=0;
    chooseSheepDirection(s);
    return;
  }
  // 用记录的具体对象，避免两只狗共用 type 时认错
  const c=SEESAW.guestObj || (SEESAW.guest && CRITTERS.find(v=>v.type===SEESAW.guest));
  if(c){
    c.mode='';
    c.timer=0;
    c.playT=0;
    c.targetPoop=null;
    c.buryPoop=null;
    if(c.type==='dog'){ c.behavior='wander'; c.behaviorT=180+Math.random()*120|0; }
  }
}

function updateHeadEffect(){
  if(P.headEffectCd>0) P.headEffectCd--;
  const s=SHEEP[0];
  const rh=rabbitHeadRect();
  const sh=sheepHeadRect(s);
  const rc={x:rh.x+rh.w/2,y:rh.y+rh.h/2};
  const sc={x:sh.x+sh.w/2,y:sh.y+sh.h/2};
  const isHeadBump = P.moving && P.headEffectCd<=0 && (
    nearRects(rh,sh,5) || dist(rc.x,rc.y,sc.x,sc.y)<24
  );
  if(isHeadBump) triggerHeadEffect((rc.x+sc.x)/2, Math.min(rc.y,sc.y)-10);
}

// ── 对话气泡 ─────────────────────────────────────────
const BUBBLES=['哔哔！','咩咩~','好天气','摸鱼中','zzZ','嗷呜！','好困','胡萝卜！'];
const CRITTER_BUBBLES = {
  dog: ['汪！','闻闻','跑跑！','守农场'],
  cat: ['喵~','晒太阳','伸懒腰','盯蜜蜂'],
  bee: ['嗡嗡','采花','忙忙忙','花香！'],
  chicken: ['咯咯','下蛋？','啄啄','早安！'],
};
let bubble='', bubT=0;

function dist(a,b,c,d){
  return Math.hypot(a-c,b-d);
}

function addFloat(x,y,text,color='#fff6a8'){
  FLOATS.push({x,y,text,color,life:70});
}

function setBubble(text, time=95){
  bubble=text;
  bubT=time;
}

function drawBubble(bx, by, text){
  const tw=text.length*7+12;
  const lx=bx-tw/2|0, ly=by-26;
  px(lx,ly,tw,17,'#ffffffee');
  // 边框
  ctx.strokeStyle='#7a5025'; ctx.lineWidth=1.5;
  ctx.strokeRect(lx+0.5,ly+0.5,tw-1,16);
  // 小箭头
  ctx.fillStyle='#ffffffee';
  ctx.beginPath(); ctx.moveTo(bx-4,ly+16); ctx.lineTo(bx+4,ly+16); ctx.lineTo(bx,ly+22); ctx.fill();
  ctx.strokeStyle='#7a5025'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(bx-4,ly+16); ctx.lineTo(bx,ly+22); ctx.lineTo(bx+4,ly+16);
  ctx.stroke();
  ctx.fillStyle='#3a2010';
  ctx.font='bold 9px Courier New';
  ctx.fillText(text, lx+6, ly+12);
}

// ── HUD ──────────────────────────────────────────────
function drawHUD(tick){
  px(4,4,245,22,'rgba(0,0,0,0.5)');
  ctx.fillStyle='#f5e642';
  ctx.font='bold 12px Courier New';
  const hh=String(Math.floor(tick/3600)%24).padStart(2,'0');
  const mm=String(Math.floor(tick/60)%60).padStart(2,'0');
  ctx.fillText(`🌾 Vibe Farm  ${hh}:${mm}  🥕x${P.carrots}`, 10, 20);
}

// ── 主循环 ───────────────────────────────────────────
let tick=0;

function updateCamera(){
  const tx = P.x + P.w/2 - VW/2;
  const ty = P.y + P.h/2 - VH/2;
  cam.x += (tx - cam.x) * 0.12;
  cam.y += (ty - cam.y) * 0.12;
  cam.x = Math.max(0, Math.min(cam.x, WORLD_W - VW));
  cam.y = Math.max(0, Math.min(cam.y, WORLD_H - VH));
}

function update(){
  tick++;
  updateCamera();
  updateCarrots();
  updateGrass();
  updateFloats();
  updateEffects();
  updateCritters();
  updateSeesaw();
  let dx=0, dy=0;
  if(!SEESAW.seated){
    if(KEYS['w']||KEYS['arrowup'])    { dy=-P.speed; P.dir=0; }
    if(KEYS['s']||KEYS['arrowdown'])  { dy= P.speed; P.dir=2; }
    if(KEYS['a']||KEYS['arrowleft'])  { dx=-P.speed; P.dir=3; }
    if(KEYS['d']||KEYS['arrowright']) { dx= P.speed; P.dir=1; }
  }

  P.moving = dx!==0||dy!==0;
  if(dx && canMove(P.x+dx, P.y)) P.x+=dx;
  else if(dx && P.interactCd<=0 && blockedBySheep(P.x+dx,P.y)){
    setBubble('别挤咩~',70);
    const s=SHEEP[0]; s.bubble='咩？'; s.bubT=70;
    P.interactCd=120;
  }
  if(dy && canMove(P.x, P.y+dy)) P.y+=dy;
  else if(dy && P.interactCd<=0 && blockedBySheep(P.x,P.y+dy)){
    setBubble('贴贴！',70);
    const s=SHEEP[0]; s.bubble='咩咩'; s.bubT=70;
    P.interactCd=120;
  }
  P.x=Math.max(T, Math.min(P.x, (COLS-2)*T-P.w));
  P.y=Math.max(T, Math.min(P.y, (ROWS-2)*T-P.h));
  if(P.interactCd>0) P.interactCd--;

  if(P.moving){ P.ft++; if(P.ft>10){P.ft=0;P.frame^=1;} }
  else { P.frame=0; }
  updateHeadEffect();

  for(const s of SHEEP){
    s.talkT--;
    if(s.talkT<=0){
      const lines=['咩~','散步','晒太阳','兔叽在哪'];
      s.bubble=lines[Math.random()*lines.length|0];
      s.bubT=85;
      s.talkT=180+Math.random()*240|0;
    }
    if(s.bubT>0) s.bubT--;
    if(s.mode==='seesaw'){
      s.dir=s.dx>=0?1:0;
      continue;
    }

    s.timer--;
    if(s.timer<=0){
      s.timer=80+Math.random()*120|0;
      chooseSheepDirection(s);
      s.mood='散步';
    }
    const ox=s.x, oy=s.y;
    const nx=s.x+s.dx, ny=s.y+s.dy;
    if(canSheepMove(s,nx,ny)){ s.x=nx; s.y=ny; }
    else if(canSheepMove(s,nx,s.y)){ s.x=nx; s.dy=-s.dy; }
    else if(canSheepMove(s,s.x,ny)){ s.y=ny; s.dx=-s.dx; }
    else { chooseSheepDirection(s); }
    if(dist(ox,oy,s.x,s.y)<0.05){ s.stuck=(s.stuck||0)+1; } else { s.stuck=0; }
    if(s.stuck>24){ chooseSheepDirection(s); s.timer=70+Math.random()*90|0; s.stuck=0; }
    s.x=Math.max(T,Math.min(s.x,(COLS-2)*T-22));
    s.y=Math.max(T,Math.min(s.y,(ROWS-2)*T-18));
    s.dir=s.dx>=0?1:0;
  }

  if(tick%200===0 && Math.random()<0.45){
    bubble=BUBBLES[Math.random()*BUBBLES.length|0];
    bubT=100;
  }
  if(bubT>0) bubT--;
  SPACE_HIT=false;
}

function softShadow(cx, cy, rx, ry){
  ctx.fillStyle='rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();
}

function drawVignette(){
  const g=ctx.createRadialGradient(VW/2,VH/2,VH*0.34,VW/2,VH/2,VH*0.8);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(18,14,34,0.30)');
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
}

function draw(){
  ctx.clearRect(0,0,VW,VH);
  ctx.save();
  ctx.translate(-Math.round(cam.x), -Math.round(cam.y));

  // 仅绘制相机可见范围内的格子
  const c0=Math.max(0,(cam.x/T|0)-1), c1=Math.min(COLS,((cam.x+VW)/T|0)+2);
  const r0=Math.max(0,(cam.y/T|0)-1), r1=Math.min(ROWS,((cam.y+VH)/T|0)+2);

  // 地图底层
  for(let ty=r0;ty<r1;ty++){
    for(let tx=c0;tx<c1;tx++){
      const t=MAP[ty][tx];
      if(t===2){ drawWater(tx,ty,tick); continue; }
      if(t===4||t===5||t===6||t===7){
        // 先画草底
        const c=(tx+ty)%2===0?'#6bc96b':'#5db85d';
        px(tx*T,ty*T,T,T,c); continue;
      }
      if(t===8){
        const c=(tx+ty)%2===0?'#c2845a':'#ae7048';
        px(tx*T,ty*T,T,T,c); continue;
      }
      const cols=TCOL[t]||['#6bc96b','#5db85d'];
      px(tx*T,ty*T,T,T,cols[(tx+ty)%2]);

      if(t===3){ // 栅栏细节
        px(tx*T+2,ty*T+2,3,T-4,'#7a5025');
        px(tx*T+T-5,ty*T+2,3,T-4,'#7a5025');
        px(tx*T+2,ty*T+5,T-4,3,'#9a6835');
        px(tx*T+2,ty*T+T-8,T-4,3,'#9a6835');
        px(tx*T+5,ty*T+3,T-10,1,'rgba(255,230,150,0.18)');
      } else if(t===1 || t===9){
        px(tx*T+3,ty*T+5,4,2,'rgba(80,50,20,0.18)');
        px(tx*T+13,ty*T+12,6,2,'rgba(80,50,20,0.15)');
        px(tx*T+7,ty*T+19,3,2,'rgba(255,255,255,0.12)');
        if(t===1){
          px(tx*T+2,ty*T+8,T-4,1,'rgba(80,45,18,0.18)');
          px(tx*T+4,ty*T+17,T-8,1,'rgba(80,45,18,0.16)');
        }
      } else if(t===0){
        const seed=(tx*31+ty*17)%11;
        if(seed===0) px(tx*T+5,ty*T+15,2,5,'#469b47');
        if(seed===3) px(tx*T+15,ty*T+7,2,4,'#4faa50');
        if(seed===6){
          px(tx*T+9,ty*T+13,2,2,'#fff2a0');
          px(tx*T+11,ty*T+13,2,2,'#ffd060');
        }
      }
    }
  }

  // 小地物
  for(let ty=r0;ty<r1;ty++)
    for(let tx=c0;tx<c1;tx++)
      if(MAP[ty][tx]===5) drawFlower(tx,ty,tick);
      else if(MAP[ty][tx]===7) drawStone(tx,ty);
      else if(MAP[ty][tx]===8) drawCrop(tx,ty,tick);

  GRASS_PATCHES.forEach(g=>drawGrassPatchAt(g.x,g.y,g.eaten,tick));
  CARROTS.forEach(c=>drawCarrot(c,tick));
  POOPS.forEach(drawPoop);
  drawSpawnFence();
  drawGarden();
  drawNests();
  drawFountain();
  drawSeesaw();

  // Y排序精灵列表
  const sprites=[];

  for(let ty=r0;ty<r1;ty++)
    for(let tx=c0;tx<c1;tx++)
      if(MAP[ty][tx]===4)
        sprites.push({y:ty*T+T*2, draw:()=>drawTree(tx,ty)});

  for(const s of SHEEP)
    sprites.push({y:s.y+18, draw:()=>{
      softShadow(s.x+11, s.y+19, 11, 4);
      drawSheep(s.x,s.y,s.dir);
      if(s.bubT>0) drawBubble(s.x+11, s.y-4, s.bubble);
    }});

  for(const c of CRITTERS)
    sprites.push({y:c.y+(c.type==='bee'?12:18), draw:()=>{
      if(c.type!=='bee') softShadow(c.x+11, c.y+19, 10, 4);
      drawCritter(c);
      if(c.bubT>0) drawBubble(c.x+11, c.y+(c.type==='bee'?4:0), c.bubble);
    }});

  sprites.push({
    y: P.y+P.h,
    draw:()=>{
      softShadow(P.x+P.w/2, P.y+P.h-1, 10, 4);
      drawRabbit(P.x, P.y, P.dir, P.frame, true);
      drawRabbitChew(P.x, P.y, P.dir, tick);
      if(bubT>0) drawBubble(P.x+P.w/2, P.y-4, bubble);
    }
  });

  sprites.sort((a,b)=>a.y-b.y);
  sprites.forEach(s=>s.draw());
  FLOATS.forEach(drawFloat);
  EFFECTS.forEach(drawEffect);

  ctx.restore();

  // 屏幕空间叠加层（不随相机滚动）
  drawVignette();
  drawHUD(tick);
}

// 启动前：把所有实体推到非实体格子，并让相机对准兔叽
(function initWorld(){
  const ents=[...CARROTS, ...GRASS_PATCHES, ...CRITTERS, ...SHEEP, P];
  for(const e of ents){
    let tries=0;
    while(tries<60 && (
      tileAt(e.x+10,e.y+16)===2 || tileAt(e.x+10,e.y+16)===4 ||
      tileAt(e.x+10,e.y+16)===7 || tileAt(e.x+10,e.y+16)===3)){
      const a=Math.random()*Math.PI*2, r=(tries/8+1)*T;
      e.x=Math.max(T,Math.min(e.x+Math.cos(a)*r, WORLD_W-2*T));
      e.y=Math.max(T,Math.min(e.y+Math.sin(a)*r, WORLD_H-2*T));
      tries++;
    }
  }
  cam.x=Math.max(0,Math.min(P.x+P.w/2-VW/2, WORLD_W-VW));
  cam.y=Math.max(0,Math.min(P.y+P.h/2-VH/2, WORLD_H-VH));
})();

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

					<p><em>Description</em></p>
<blockquote>
<p>给定一棵树，输出树的根root，孩子最多的结点max以及它的孩子。</p>
</blockquote>
<a id="more"></a>
<p><em>Analysis</em></p>
<p>树结构签到题..存储一下边关系输出孩子最多的，随便取一个点上传再得到根节点。</p>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Vibe Farm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    h1 {
      color: #f5e642;
      font-size: 18px;
      margin-bottom: 6px;
      text-shadow: 2px 2px #c8a400;
      letter-spacing: 3px;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 4px solid #5a3e1b;
      box-shadow: 0 0 24px rgba(245,230,66,0.25);
      max-width: calc(100vw - 24px);
      max-height: calc(100vh - 74px);
    }
    #tip { color: #888; font-size: 11px; margin-top: 6px; letter-spacing: 1px; }
  </style>
</head>
<body>
<h1>🌾 Vibe Farm 🌾</h1>
<canvas id="c"></canvas>
<div id="tip">WASD move bunny · ↑↓←→ move sheep · Space/Enter interact · Bunny eats carrots</div>
<script src="js/config.js"></script>
<script src="js/map.js"></script>
<script src="js/entities.js"></script>
<script src="js/physics.js"></script>
<script src="js/draw.js"></script>
<script src="js/update.js"></script>
<script src="js/main.js"></script>
</body>
</html>
